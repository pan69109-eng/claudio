<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Claudio Radio - Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1DB954 0%, #191414 100%);
      color: white;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 15px 20px;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { color: #1DB954; margin: 0; font-size: 20px; }
    .status { font-size: 12px; color: #1DB954; }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 15px;
      line-height: 1.4;
    }
    .user {
      align-self: flex-end;
      background: #1DB954;
      border-bottom-right-radius: 5px;
    }
    .claudio {
      align-self: flex-start;
      background: rgba(255,255,255,0.15);
      border-bottom-left-radius: 5px;
    }
    .input-area {
      padding: 15px 20px;
      background: rgba(0,0,0,0.5);
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      outline: none;
    }
    button {
      padding: 12px 24px;
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1ed760; }
    button:disabled { background: #555; cursor: not-allowed; }
    .playing { background: rgba(29, 185, 84, 0.3); padding: 8px 12px; border-radius: 8px; margin-top: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claudio Radio</h1>
    <span class="status" id="status">就绪</span>
  </div>

  <div class="chat-container" id="chat">
    <div class="message claudio">
      你好！我是 Claudio，你的个人 AI 电台 DJ。
      告诉我你想听什么歌，或者直接说"播放 + 歌曲名"~
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="说点什么..." onkeypress="handleKey(event)" />
    <button onclick="send()" id="sendBtn">发送</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    // 检查登录状态
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth-status');
        const data = await res.json();
        if (!data.loggedIn) {
          addMessage('⚠️ 请先登录 Spotify 才能使用聊天功能。正在跳转到登录页面...');
          setTimeout(() => { window.location.href = '/login.html'; }, 2000);
          input.disabled = true;
          sendBtn.disabled = true;
        }
      } catch (err) {
        console.error('检查登录状态失败:', err);
      }
    }
    checkAuth();

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'claudio'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addPlayingInfo(trackName, artist) {
      const div = document.createElement('div');
      div.className = 'playing';
      div.textContent = `🎵 正在播放: ${trackName} - ${artist}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';
      sendBtn.disabled = true;
      status.textContent = '思考中...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        if (data.error) {
          addMessage('错误: ' + data.error);
        } else {
          if (data.speech) {
            addMessage(data.speech);
          }
          if (data.track) {
            addPlayingInfo(data.track.name, data.track.artist);
          }
          if (data.response) {
            addMessage(data.response);
          }
        }
      } catch (err) {
        addMessage('发送失败: ' + err.message);
      }

      sendBtn.disabled = false;
      status.textContent = '就绪';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }
  </script>
</body>
</html>
